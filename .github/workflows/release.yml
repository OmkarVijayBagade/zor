name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: zor-linux-x86_64

          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: zor-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: zor-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/zor ${{ matrix.binary_name }}
          chmod +x ${{ matrix.binary_name }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}